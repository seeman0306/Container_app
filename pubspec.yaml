name: smart_city_container
description: A container app for Urban Smart City modules.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0
  flutter_secure_storage: ^9.2.2
  geolocator: ^13.0.0
  geocoding: ^4.0.0
  image_picker: ^1.1.0
  fl_chart: any
  intl: ^0.19.0
  url_launcher: ^6.3.2
  flutter_windowmanager_plus: ^1.0.1
  path_provider: ^2.1.4
  open_filex: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/wards.json
